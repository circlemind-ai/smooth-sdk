name: Publish TypeScript SDK to npm

on:
  release:
    types: [published]

  workflow_dispatch:

jobs:
  build-n-publish:
    name: Build and publish TypeScript SDK to npm
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ts

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
